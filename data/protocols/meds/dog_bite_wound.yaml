# Clinician-facing medication/dosing protocol for: dog_bite_wound
# Tier 1: reviewer must approve/modify.
rx_options:
  - med: "Amoxicillin-clavulanate"
    dosing: "875/125 mg PO BID x 3–5 days (prophylaxis for higher-risk bites) OR 5–7 days if mild infection, 7–10 days if established infection"
    exclusions: "Immediate-type beta-lactam allergy; renal impairment requires adjustment; severe hepatic disease with prior cholestatic jaundice from amox-clav"
    notes: "First-line when antibiotics indicated (hand bites, deep wounds, immunocompromise, delayed presentation, facial wounds, puncture/crush injury)."
  - med: "Doxycycline + Metronidazole"
    dosing: "Doxycycline 100 mg PO BID + Metronidazole 500 mg PO TID x 5–7 days"
    exclusions: "Pregnancy; children <8 years (doxycycline); alcohol use with metronidazole; significant liver disease; drug interactions"
    notes: "Alternative for severe beta-lactam allergy."
  - med: "Clindamycin + Trimethoprim-sulfamethoxazole (TMP-SMX)"
    dosing: "Clindamycin 300–450 mg PO TID + TMP-SMX DS (160/800) PO BID x 5–7 days"
    exclusions: "Sulfa allergy; pregnancy considerations (avoid 1st trimester if possible and near term); C. difficile history/high CDI risk (clindamycin)"
    notes: "Alternative when MRSA concern exists or for beta-lactam allergy (clinician judgment)."

supportive_care:
  - item: "Local wound care"
    details: "Copious irrigation; gentle cleansing; keep clean/dry; elevate if swollen."
  - item: "Pain control"
    details: "Acetaminophen (Tylenol) if safe. Ibuprofen (Advil) if safe and no contraindications."
  - item: "Tetanus / rabies considerations"
    details: "Assess tetanus status; rabies risk assessment based on animal status/local guidance; in-person evaluation if uncertain."

followup_and_safety:
  - item: "In-person evaluation recommended"
    details: "Hand bites, deep puncture/crush wounds, immunocompromise, worsening redness/swelling, fever/chills, numbness/weakness, limited range of motion, or concern for tendon/joint involvement."
  - item: "Urgent/ED now"
    details: "Rapidly spreading infection, severe pain, fever/toxicity, red streaking, loss of function, or signs of systemic infection."
