id: low_back_pain
label: Low back pain

match:
  any_keywords: ["back pain", "low back", "sciatica", "lumbar", "backache"]

questions:
  - id: onset
    prompt: "When did the back pain start? (today, 1-3 days, 4-14 days, >2 weeks)"
    type: text
    store_as: back_onset

  - id: trauma
    prompt: "Did this start after a significant fall or accident? (yes/no)"
    type: yesno
    store_as: trauma

  - id: neuro
    prompt: "Any leg weakness, groin numbness, or trouble controlling urine or bowel movements? (yes/no)"
    type: yesno
    store_as: cauda_equina

  - id: fever
    prompt: "Do you have fever or a weakened immune system? (yes/no)"
    type: yesno
    store_as: infection_risk

  - id: radiating
    prompt: "Does the pain radiate down one leg below the knee? (yes/no)"
    type: yesno
    store_as: sciatica
