id: cellulitis
version: 0.6
match:
  any_keywords:
    [
      "cellulitis",
      "skin infection",
      "skin redness spreading",
      "hot red skin",
      "red swollen skin",
      "red swollen leg",
      "red swollen foot",
      "infected wound",
      "infected bite",
    ]

questions:
  # --- Core cellulitis features ---
  - id: limb_infection_signs
    prompt: "Which of these are you having? Say all that apply (or say 'none'): redness, warmth, swelling, tenderness to touch."
    type: text
    store_as: limb_infection_signs

  - id: portal_of_entry
    prompt: "Is there a possible entry point? Say all that apply (or say 'none'): cut/scrape, wound, insect bite, athlete’s foot/cracked skin, recent shaving, injection site."
    type: text
    store_as: portal_of_entry

  - id: systemic_symptoms
    prompt: "Are you having any systemic symptoms? Say all that apply (or say 'none'): fever, chills, feeling very ill."
    type: text
    store_as: systemic_symptoms

  # --- Purulence / abscess screen ---
  - id: purulence
    prompt: "Is there any pus, drainage, a boil, or a pocket of fluid that feels like an abscess? (yes/no/unknown)"
    type: text
    store_as: purulence

  # --- High-risk locations ---
  - id: face_or_eye_area
    prompt: "Is the redness/swelling on the face or around an eye? (yes/no/unknown)"
    type: text
    store_as: face_or_eye_area

  # --- Host risk / severity ---
  - id: immunocompromised
    prompt: "Do you have any conditions that weaken the immune system? Say all that apply (or say 'none'): chemotherapy, transplant meds, long-term steroids, uncontrolled diabetes, HIV."
    type: text
    store_as: immunocompromised

  - id: rapidly_spreading
    prompt: "Is the redness spreading quickly over hours, or getting much worse today? (yes/no/unknown)"
    type: text
    store_as: rapidly_spreading

  # --- Nec fasc screen (single-idea) ---
  - id: pain_out_of_proportion
    prompt: "Is the pain severe compared with what you can see on the skin? (yes/no/unknown)"
    type: text
    store_as: pain_out_of_proportion
