id: tick_bite
version: 0.5
match:
  any_keywords: ["tick bite", "tick", "bitten by a tick", "ticks", "deer tick"]

questions:
  - id: systemic_symptoms
    prompt: "Do you have any of these: fever, chills, severe headache, body aches, or stiff neck? Reply with all that apply, or say none."
    store_as: systemic_symptoms

  - id: bullseye_rash
    prompt: "Is there an expanding rash, especially a bullseye-like rash? (yes/no)"
    store_as: bullseye_rash
    type: yesno

  # IMPORTANT: free-text to avoid the engine treating slash options as a required enum.
  - id: tick_attachment_timeframe
    prompt: "About how long might the tick have been attached? You can answer in hours (e.g., 8 hours, 37 hours) or a range (e.g., under 24 hours, 24 to 72 hours, over 72 hours), or say unknown."
    store_as: tick_attachment_timeframe

  - id: exposure_state
    prompt: "What state are you in (or where was the exposure)?"
    store_as: exposure_state

  # Also keep as free-text, but with examples (no slash enums).
  - id: pregnancy_possible
    prompt: "Is there any chance you could be pregnant? You can answer yes, no, unknown, or not applicable."
    store_as: pregnancy_possible

stop_rules:
  - if_all_answered:
      ["systemic_symptoms", "bullseye_rash", "tick_attachment_timeframe", "exposure_state", "pregnancy_possible"]
    outcome: DECIDE

routing:
  tier_default: TIER_2_REVIEW

treatment_rules:
  - id: lyme_erythema_migrans_treat
    when:
      bullseye_rash: "yes"
    recommend:
      kind: "antibiotic_treatment"
      note: "Erythema migrans is diagnostic for early localized Lyme; treat rather than observe."

  - id: lyme_pep_possible
    when:
      bullseye_rash: "no"
      tick_attached_timeframe_any: ["24-72 hours", "over 72 hours", "72+ hours", "72 hours or more"]
      high_incidence_state: true
    recommend:
      kind: "post_exposure_prophylaxis"
      note: "Consider single-dose doxycycline PEP if all CDC criteria are met (incl. within 72h of removal and no contraindications)."
